name: Validate OCPC Toolkit

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate synthetic example
        run: python scripts/validate_ocpc_project.py examples/campus-sound-map

      - name: Validate reusable template
        run: python scripts/validate_ocpc_project.py toolkit/templates/project

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
