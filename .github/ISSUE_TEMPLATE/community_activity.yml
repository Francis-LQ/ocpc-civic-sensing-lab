name: Community activity
description: 提议一次 CSL 7 天社区共创挑战。
title: "[Community Activity] "
labels:
  - proposal
body:
  - type: input
    id: activity_title
    attributes:
      label: 活动主题
      description: 例如“校园遮阴与声景 7 天挑战”。
    validations:
      required: true
  - type: dropdown
    id: initiator_role
    attributes:
      label: 发起者角色
      options:
        - 老师
        - 馆员
        - 家长
        - 学生社团
        - 社区志愿者
        - 其他
    validations:
      required: true
  - type: textarea
    id: participants
    attributes:
      label: 目标参与者
      description: 说明大致年龄段、人数、参与场景；不要填写真实姓名或联系方式。
    validations:
      required: true
  - type: dropdown
    id: minors
    attributes:
      label: 是否涉及 14–17 岁参与者
      options:
        - 不涉及
        - 涉及，且会执行监护确认
        - 尚不确定，需要先评估
    validations:
      required: true
  - type: textarea
    id: public_artifacts
    attributes:
      label: 计划公开成果
      description: 列出活动说明、协议、Rubric、去标识化聚合摘要、复盘等。
    validations:
      required: true
  - type: textarea
    id: private_data
    attributes:
      label: 私有数据处理
      description: 说明报名、授权、身份映射、原始音频、原始图片和撤回日志将保存在何处，且不会进入 GitHub。
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: 7 天时间表
      description: 按 Day 0 到 Day 7 描述关键任务和发布门禁。
    validations:
      required: true
  - type: textarea
    id: support_needed
    attributes:
      label: 需要维护者支持的事项
      description: 例如安全边界审阅、项目包创建、模板调整或公开发布检查。
    validations:
      required: false
  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交确认
      options:
        - label: 我不会在 issue、PR 或公开项目包中提交姓名、联系方式、身份映射或其他个人信息。
          required: true
        - label: 我不会提交精确位置、个人轨迹、未经授权的原始资料、原始音频、图片或学生作品。
          required: true
        - label: 如涉及 14–17 岁参与者，我会先完成监护确认；未成年人原音频不会公开。
          required: true
        - label: 我理解本 issue 是活动提案，不代表活动已经获得公开发布批准。
          required: true
